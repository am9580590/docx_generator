<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX Generator</title>
    
    <!-- Надежные CDN для работы в вебе -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #1a1a1a; text-align: center; }
        input[type="file"] { width: 100%; margin-bottom: 20px; padding: 10px; border: 2px dashed #cbd5e0; border-radius: 10px; cursor: pointer; }
        .field-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a5568; font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; transition: border 0.2s; }
        input[type="text"]:focus { border-color: #4299e1; outline: none; }
        #generateBtn { width: 100%; background: #3182ce; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
        #generateBtn:hover { background: #2b6cb0; }
        .empty-msg { text-align: center; color: #a0aec0; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Заполнение документа</h1>
    
    <label>1. Выберите файл шаблона (.docx)</label>
    <input type="file" id="upload" accept=".docx">

    <div id="formContainer">
        <p class="empty-msg">Загрузите файл, чтобы увидеть поля</p>
    </div>

    <button id="generateBtn">Создать и скачать документ</button>
</div>

<script>
    let zipData = null;

    document.getElementById('upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                zipData = new window.PizZip(event.target.result);
                const xmlText = zipData.files["word/document.xml"].asText();
                
                // Ищем теги {переменная}
                const regex = /\{([^{}]+)\}/g;
                const tags = new Set();
                let match;
                while ((match = regex.exec(xmlText)) !== null) {
                    const cleanTag = match[1].replace(/<[^>]+>/g, "").trim();
                    if (cleanTag) tags.add(cleanTag);
                }
                
                renderFields(Array.from(tags));
            } catch (err) {
                alert("Ошибка чтения файла. Проверьте формат .docx");
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function renderFields(tags) {
        const container = document.getElementById('formContainer');
        const btn = document.getElementById('generateBtn');
        container.innerHTML = "";

        if (tags.length === 0) {
            container.innerHTML = "<p class='empty-msg'>В документе не найдено тегов вида {текст}</p>";
            btn.style.display = 'none';
            return;
        }

        tags.forEach(tag => {
            const div = document.createElement('div');
            div.className = 'field-group';
            div.innerHTML = `
                <label>${tag}</label>
                <input type="text" class="doc-input" data-tag="${tag}">
            `;
            container.appendChild(div);
        });
        btn.style.display = 'block';
    }

    document.getElementById('generateBtn').onclick = () => {
        try {
            const doc = new window.docxtemplater(zipData, { paragraphLoop: true, linebreaks: true });
            const data = {};
            document.querySelectorAll('.doc-input').forEach(input => {
                data[input.dataset.tag] = input.value;
            });

            doc.render(data);
            const out = doc.getZip().generate({
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
            });
            saveAs(out, "filled_doc.docx");
        } catch (error) {
            alert("Ошибка генерации: " + error.message);
        }
    };
</script>

</body>
</html>
